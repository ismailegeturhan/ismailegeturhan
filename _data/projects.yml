- name: İngilizceyi Nasıl Sevebiliriz?
  link: null
  image: 'https://i2.milimaj.com/i/milliyet/75/750x0/636caeca86b2441cc4444ced.jpg'
  description: >-
    Bir grup arkadaşla giriştiğimiz dil çalışmalarına giriş mahiyetinde olacak
    yazı serisinin en önemli ayaklarından biri olan İngilizce Öğrenme yazısını
    kaleme alma sebebim, dil yazılarımızı takip edecek arkadaşlara nereden
    başlamaları gerektiği konusunda bilgi edindirmektir. Oluşan dil havzasında
    öğreneceğimiz dillerin çoğunu öğrenirken İngilizceye ihtiyacımız oluyor.
    Çünkü herhangi bir konuda bilgi edinmenin gerekliliklerinden biri artık
    İngilizce bilmek. İnternet ortamında üretilen içeriklerin %59’u İngilizce
    olduğu için; hangi milletten olursanız olun, hangi konuda araştırma
    yapıyorsanız yapın, neticede İngilizceye ihtiyaç duyacaksınız. Aşağıdaki
    linkte, dillerin internet ortamındaki kullanıcı sayıları ve bilgi
    kapasiteleri hakkında bilgiler var. İncelerseniz, İngilizceyi neden
    öğrenmeniz gerektiğini daha iyi kavrarsınız.
